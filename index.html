<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | JUSTSALE POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="container text-center py-5 fade-in">
            <div class="mb-4">
                <i class="fa-solid fa-cash-register text-primary mb-3" style="font-size: 5rem;"></i>
                <h1 class="display-4 fw-black text-dark mb-2">JUSTSALE POS</h1>
                <p class="lead text-muted">Advanced Inventory & Point of Sale Intelligence System</p>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-5">
                <a href="login" class="btn btn-primary-custom btn-lg px-5 py-3 shadow">
                    <i class="fa-solid fa-sign-in-alt me-2"></i> Enter System
                </a>
                <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="btn btn-white btn-lg px-5 py-3 border shadow-sm">
                    <i class="fa-solid fa-info-circle me-2 text-info"></i> About System
                </a>
            </div>

            <div class="mt-5 pt-5">
                <p class="text-muted small mb-0">Transforming the way you manage sales and inventory.</p>
                <p class="text-muted small">Designed for Speed, Security, and Scalability.</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer text-center">
        <div class="container">
            <span class="text-muted small">JUSTSALE POS System | Powered by <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="text-primary fw-bold text-decoration-none">Franklin</a></span>
            <span class="version-tag">Ver: 2.0.4</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-redirect if already logged in
        fetch('api/auth.php?action=me').then(r => r.json()).then(data => {
            if (data.success && data.user) {
                if (data.user.role === 'Cashier') window.location.href = 'pos';
                else window.location.href = 'admin';
            }
        });
    </script>
</body>

</html>
