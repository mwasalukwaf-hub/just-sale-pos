<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Purchase Order | JUSTSALE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="top-main-nav">
        <div class="d-flex align-items-center">
            <div class="brand"><i class="fa-solid fa-cash-register me-2"></i>JUSTSALE</div>
            <div class="nav-links-container">
                <a href="admin" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="pos" target="_blank" class="nav-link"><i class="fa-solid fa-cash-register"></i> POS
                    Terminal</a>
                <div class="dropdown nav-link-dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-boxes-stacked"></i> Inventory
                    </a>
                    <ul class="dropdown-menu shadow-sm">
                        <li><a class="dropdown-item" href="inventory"><i class="fa-solid fa-boxes-stacked"></i> Catalog
                                &
                                Movements</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="receive-goods"><i class="fa-solid fa-file-invoice"></i> PO
                                Request</a></li>
                        <li><a class="dropdown-item" href="reception"><i class="fa-solid fa-truck-pickup"></i> Goods
                                Reception</a></li>
                        <li><a class="dropdown-item active" href="purchases"><i
                                    class="fa-solid fa-file-invoice-dollar"></i>
                                Purchase Orders</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="suppliers"><i class="fa-solid fa-handshake"></i>
                                Suppliers</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="nav-user-controls" id="current-user"></div>
    </nav>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <a href="purchases" class="btn btn-outline-secondary btn-sm rounded-circle me-3" title="Back to List">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <h4 class="m-0 text-secondary fw-bold" id="pageTitle">Purchase Order Details</h4>
            </div>
            <div class="d-flex gap-2" id="actionButtons">
                <button class="btn btn-outline-secondary px-4 me-2" id="printPoBtn">
                    <i class="fa-solid fa-file-pdf me-2"></i> Preview PO PDF
                </button>
            </div>
        </div>

        <div id="detailsPlaceholder">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Retrieving PO data...</p>
            </div>
        </div>

        <div id="detailsContent" style="display: none;">
            <!-- Injected by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer text-center">
        <div class="container">
            <span class="text-muted small">JUSTSALE POS System | Powered by <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="text-primary fw-bold text-decoration-none">Franklin</a></span>
            <span class="version-tag">Ver: 2.0.4</span>
        </div>
    </footer>

    <!-- PO PDF Preview Modal -->
    <div class="modal fade" id="poPdfModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered h-100 my-0">
            <div class="modal-content h-100 border-0 shadow-lg rounded-0 overflow-hidden">
                <div class="modal-header bg-dark text-white py-2 border-0 rounded-0">
                    <div class="d-flex align-items-center">
                        <i class="fa-solid fa-file-pdf me-2 text-danger"></i>
                        <h6 class="modal-title fw-bold m-0">Purchase Order PDF Preview</h6>
                    </div>
                    <div class="ms-auto d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-sm btn-outline-light border-0" id="maximizePdfModal"
                            title="Toggle Fullscreen">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                </div>
                <div class="modal-body p-0 bg-secondary bg-opacity-10 d-flex flex-column h-100">
                    <iframe id="poPdfFrame" src="about:blank" class="w-100 flex-grow-1 border-0"
                        style="height: calc(100vh - 56px);"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/view-po.js"></script>
</body>

</html>
