<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile POS | JUSTSALE</title>
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/mobile-pos.css">
</head>
<body>

    <!-- Shift Overlay -->
    <div id="shiftOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
        <i class="fa-solid fa-lock text-danger mb-4" style="font-size: 80px;"></i>
        <h2 class="fw-bold mb-2">POS SHIFT CLOSED</h2>
        <p class="text-muted mb-4">You must open a shift in the main system to start selling.</p>
        <button onclick="window.location.reload()" class="btn btn-primary-custom w-100 py-3 rounded-pill bg-primary border-0 text-white fw-bold shadow">
            <i class="fa-solid fa-sync me-2"></i> CHECK AGAIN
        </button>
        <a href="admin" class="mt-4 text-primary fw-bold text-decoration-none small">GO TO BACKOFFICE</a>
    </div>

    <!-- Header Section -->
    <div class="pos-header">
        <span id="pos-time">00:00 AM</span>
        <span class="fw-bold">JUSTSALE MOBILE</span>
        <div class="header-icons">
            <i class="fa-solid fa-signal me-2"></i>
            <i class="fa-solid fa-wifi me-2"></i>
            <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- Search Section -->
    <div class="pos-search-container">
        <div style="flex:1; position:relative;">
            <input type="text" id="productSearch" class="pos-search-input" placeholder="Enter Search Product" style="width:100%;">
        </div>
        <button class="btn-add-item"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <!-- Customer Section -->
    <div style="padding:10px; background:white; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between;">
        <div id="selectedCustomer" style="font-size:12px; font-weight:700; color:#666;">
            <i class="fa-solid fa-user-circle me-1"></i> Walk-in Customer
        </div>
        <button onclick="openCustomerModal()" style="background:none; border:none; color:var(--pos-green); font-size:12px; font-weight:700;">CHANGE</button>
    </div>

    <!-- Cart Section -->
    <div class="pos-cart-section">
        <table class="pos-table" id="cartTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th style="width: 50px;">Price</th>
                    <th style="width: 100px;">Qty</th>
                    <th style="width: 40px;">Action</th>
                </tr>
            </thead>
            <tbody id="cartItems">
                <!-- Items populated by JS -->
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">Cart is empty</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Action Buttons Grid -->
    <div class="pos-actions-row">
        <button class="btn-action btn-online">Online</button>
        <button class="btn-action btn-ongoing">Ongoing</button>
        <button class="btn-action btn-qrcode">QR code</button>
        <button class="btn-action btn-more">More</button>
    </div>

    <!-- Category Tabs -->
    <div class="pos-categories" id="categoryTabs">
        <div class="category-tab active" data-id="all">All Category</div>
        <!-- Loaded by JS -->
    </div>

    <!-- Products Grid -->
    <div class="pos-products-grid" id="productsGrid">
        <!-- Loaded by JS -->
    </div>

    <!-- Footer Section -->
    <div class="pos-footer">
        <div class="grand-total-bar">
            Grand Total : <span id="totalAmount">0.00</span>
        </div>
        <div class="bottom-actions">
            <button class="btn-bottom-icon btn-calc"><i class="fa-solid fa-calculator"></i></button>
            <button class="btn-bottom-icon btn-clear" onclick="clearCart()"><i class="fa-solid fa-trash-can"></i></button>
            <button class="btn-bottom-main btn-quick-order">Quick Order</button>
            <button class="btn-bottom-main btn-place-order" onclick="openCheckout()">Checkout</button>
        </div>
    </div>

    <!-- Customer Selection Modal -->
    <div id="customerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1100; align-items:flex-end; display:flex; visibility: hidden;">
        <div class="modal-content" style="background:white; width:100%; border-radius:20px 20px 0 0; padding:20px; animation: slideUp 0.3s ease; height: 80vh; display: flex; flex-direction: column; position: relative;">
            <div class="mb-3">
                <h4 class="fw-bold m-0" style="padding-right: 40px;">Select Customer</h4>
                <button onclick="closeCustomerModal()" style="position: absolute; top: 15px; right: 15px; background:#f1f3f5; border:none; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#495057; z-index:10;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="mb-3" style="position:relative;">
                <input type="text" id="customerSearch" class="pos-search-input" placeholder="Search customer name/mobile..." style="width:100%; background:#f8fafc;">
                <i class="fa-solid fa-search" style="position:absolute; right:15px; top:18px; color:#999;"></i>
            </div>

            <div id="customerList" style="flex:1; overflow-y:auto; margin-bottom:15px;">
                <!-- Customers loaded by JS -->
            </div>

            <button onclick="openAddCustomerModal()" style="width:100%; background:var(--pos-green); color:white; border:none; padding:18px; border-radius:15px; font-size:15px; font-weight:700;">
                <i class="fa-solid fa-plus me-2"></i> REGISTER NEW CUSTOMER
            </button>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div id="addCustomerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1200; align-items:flex-end; display:flex; visibility: hidden;">
        <div class="modal-content" style="background:white; width:100%; border-radius:20px 20px 0 0; padding:25px; animation: slideUp 0.3s ease; position: relative;">
            <div class="mb-4">
                <h4 class="fw-bold m-0">New Customer</h4>
                <button onclick="closeAddCustomerModal()" style="position: absolute; top: 15px; right: 15px; background:#f1f3f5; border:none; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#495057; z-index:10;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="addCustomerForm">
                <div class="mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Full Customer Name *" required style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #eee; width:100%;">
                </div>
                <div class="mb-3">
                    <input type="tel" name="mobile" class="form-control" placeholder="Mobile Number" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #eee; width:100%;">
                </div>
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #eee; width:100%;">
                </div>
                <div class="mb-3">
                    <input type="text" name="tin" class="form-control" placeholder="TIN Number" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #eee; width:100%;">
                </div>
                <div class="mb-4">
                    <input type="text" name="vrn" class="form-control" placeholder="VRN Number" style="padding:15px; border-radius:12px; background:#f8fafc; border:1px solid #eee; width:100%;">
                </div>

                <button type="submit" style="width:100%; background:var(--pos-green); color:white; border:none; padding:18px; border-radius:15px; font-size:16px; font-weight:800; box-shadow: 0 5px 15px rgba(0,100,0,0.2);">
                    SAVE & SELECT CUSTOMER
                </button>
            </form>
        </div>
    </div>

    <!-- Simple Checkout Modal (Mobile Friendly) -->
    <div id="checkoutModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:flex-end; display:flex; visibility: hidden;">
        <div class="modal-content" style="background:white; width:100%; border-radius:20px 20px 0 0; padding:20px; animation: slideUp 0.3s ease; position: relative;">
            <div class="mb-4">
                <h4 class="fw-bold m-0">Payment Method</h4>
                <button onclick="closeCheckout()" style="position: absolute; top: 15px; right: 15px; background:#f1f3f5; border:none; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#495057; z-index:10;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:30px;">
                <button class="btn-payment active" onclick="setPaymentMethod('Cash')" style="padding:20px; border-radius:12px; border:2px solid var(--pos-green); background:white; font-weight:700;">
                    <i class="fa-solid fa-money-bill-1 me-2"></i> CASH
                </button>
                <button class="btn-payment" onclick="setPaymentMethod('Mobile Money')" style="padding:20px; border-radius:12px; border:2px solid #ddd; background:white; font-weight:700;">
                    <i class="fa-solid fa-mobile-screen me-2"></i> MOBILE
                </button>
            </div>

            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:12px; color:#666; font-weight:700; margin-bottom:8px;">TOTAL TO PAY</label>
                <input type="text" id="finalTotal" readonly style="width:100%; font-size:32px; font-weight:900; background:#f8fafc; border:none; padding:15px; border-radius:12px; text-align:center;">
            </div>

            <button onclick="submitOrder()" style="width:100%; background:var(--pos-green); color:white; border:none; padding:20px; border-radius:15px; font-size:18px; font-weight:800; box-shadow: 0 10px 20px rgba(0,100,0,0.2);">
                FINISH & PRINT RECEIPT
            </button>
        </div>
    </div>

    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-visible { visibility: visible !important; }
        .btn-payment.active { background: rgba(0,100,0,0.05) !important; border-color: var(--pos-green) !important; color: var(--pos-green) !important; }
    </style>

    <!-- Premium Mobile Alert/Confirm Modal -->
    <div id="mobileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:3000; align-items:center; justify-content:center; padding:20px; opacity:0; transition: opacity 0.3s ease;">
        <div class="mobile-modal-content" style="background:white; width:100%; max-width:320px; border-radius:24px; padding:30px; text-align:center; transform: scale(0.85); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <div id="modalIcon" style="font-size:48px; margin-bottom:20px;"></div>
            <h4 id="modalTitle" style="font-weight:800; margin-bottom:10px; font-size:18px;"></h4>
            <p id="modalMessage" style="color:#666; font-size:14px; margin-bottom:30px;"></p>
            
            <div id="modalActions" style="display:flex; flex-direction:column; gap:10px;">
                <button id="modalPrimaryBtn" class="btn-modal-primary" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--pos-green); color:white; font-weight:700; font-size:15px; box-shadow: 0 4px 15px rgba(0,100,0,0.2);">OK</button>
                <button id="modalSecondaryBtn" class="btn-modal-secondary" style="width:100%; padding:15px; border-radius:15px; border:none; background:#f1f3f5; color:#495057; font-weight:700; font-size:15px; display:none;">Cancel</button>
            </div>
        </div>
    </div>

    <style>
        .modal-active { display:flex !important; opacity:1 !important; }
        .modal-active .mobile-modal-content { transform: scale(1) !important; }
    </style>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mobile-pos.js"></script>
</body>
</html>
