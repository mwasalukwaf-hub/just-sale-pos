<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | JUSTSALE</title>
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Top Navigation -->
    <nav class="top-main-nav">
        <div class="d-flex align-items-center">
            <div class="brand"><i class="fa-solid fa-cash-register me-2"></i>JUSTSALE</div>
            <div class="nav-links-container">
                <a href="admin" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="pos" target="_blank" class="nav-link"><i class="fa-solid fa-cash-register"></i> POS
                    Terminal</a>
                <a href="inventory" class="nav-link"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            </div>
        </div>
        <div class="nav-user-controls" id="current-user"></div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container py-4">
            <div class="row fade-in">
                <div class="col-md-4">
                    <div class="card card-elegant text-center p-4">
                        <div class="mb-3 position-relative d-inline-block">
                            <img id="profilePhotoLarge" src="" class="rounded-circle border shadow-sm" width="150"
                                height="150" style="object-fit: cover;">
                            <label for="profile_photo_input"
                                class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2 shadow-sm"
                                style="cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <i class="fa-solid fa-camera"></i>
                            </label>
                            <input type="file" id="profile_photo_input" class="d-none" accept="image/*">
                        </div>
                        <h4 class="fw-bold mb-1" id="profileFullnameDisplay"></h4>
                        <p class="text-muted mb-0" id="profileRoleDisplay"></p>
                        <hr class="my-4">
                        <div class="text-start">
                            <div class="mb-3">
                                <label class="small fw-bold text-muted">Username</label>
                                <div id="profileUsernameDisplay" class="fw-bold"></div>
                            </div>
                            <div class="mb-3">
                                <label class="small fw-bold text-muted">Email</label>
                                <div id="profileEmailDisplay" class="fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card card-elegant shadow-sm border-0">
                        <div class="card-header bg-white border-0 pt-4 px-4 overflow-hidden">
                            <h5 class="fw-bold text-primary mb-0">Update Profile Information</h5>
                            <p class="text-muted small">Update your personal information and account security.</p>
                        </div>
                        <div class="card-body p-4">
                            <form id="profileForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">Full Name</label>
                                        <input type="text" class="form-control px-3 py-2" name="fullname"
                                            id="inputFullname" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Mobile Number</label>
                                        <input type="text" class="form-control px-3 py-2" name="mobile"
                                            id="inputMobile">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Email Address</label>
                                        <input type="email" class="form-control px-3 py-2" name="email" id="inputEmail">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold text-muted">Short Bio / Details</label>
                                        <textarea class="form-control px-3 py-2" name="short_details"
                                            id="inputShortDetails" rows="2"></textarea>
                                    </div>

                                    <div class="col-12 mt-4">
                                        <h6 class="fw-bold border-bottom pb-2 mb-3">Change Password</h6>
                                        <p class="text-muted small">Leave blank if you don't want to change your
                                            password.</p>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">New Password</label>
                                        <input type="password" class="form-control px-3 py-2" name="password"
                                            id="inputPassword">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Confirm New Password</label>
                                        <input type="password" class="form-control px-3 py-2" id="inputConfirmPassword">
                                    </div>

                                    <div class="col-12 mt-4 text-end">
                                        <button type="submit" class="btn btn-primary-custom px-5 py-2 fw-bold">
                                            <i class="fa-solid fa-save me-1"></i> Update Profile
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer text-center">
        <div class="container">
            <span class="text-muted small">JUSTSALE POS System | Powered by <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="text-primary fw-bold text-decoration-none">Franklin</a></span>
            <span class="version-tag">Ver: 2.0.5</span>
        </div>
    </footer>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/profile.js"></script>
</body>

</html>
