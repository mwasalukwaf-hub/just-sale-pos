<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | JUSTSALE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Top Navigation -->
    <nav class="top-main-nav">
        <div class="d-flex align-items-center">
            <div class="brand"><i class="fa-solid fa-cash-register me-2"></i>JUSTSALE</div>
            <div class="nav-links-container">
                <a href="admin" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="pos" target="_blank" class="nav-link"><i class="fa-solid fa-cash-register"></i> POS
                    Terminal</a>
                <a href="inventory" class="nav-link"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            </div>
        </div>
        <div class="nav-user-controls" id="current-user">
            <!-- User Info & Dropdown injected by app.js -->
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0 fw-bold text-secondary">Settings & User Management</h4>
        </div>

        <div class="row fade-in">
            <div class="col-md-10 mx-auto">
                <div class="card card-elegant overflow-hidden">
                    <div class="row g-0">
                        <!-- Sidebar Tabs -->
                        <div class="col-md-3 bg-light border-end">
                            <div class="nav flex-column nav-pills p-3">
                                <a href="settings" class="nav-link text-start mb-2 fw-bold"
                                    style="color: var(--text-dark);">
                                    <i class="fa-solid fa-building me-2"></i> General Settings
                                </a>
                                <a href="settings#v-pills-smtp" class="nav-link text-start mb-2 fw-bold"
                                    style="color: var(--text-dark);">
                                    <i class="fa-solid fa-envelope me-2"></i> SMTP Setup
                                </a>
                                <a href="users" class="nav-link active text-start mb-2 fw-bold">
                                    <i class="fa-solid fa-users me-2"></i> User Management
                                </a>
                            </div>
                        </div>

                        <!-- Content Area -->
                        <div class="col-md-9 p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold text-primary mb-0">Manage Platform Users</h5>
                                <button class="btn btn-primary-custom" data-bs-toggle="modal"
                                    data-bs-target="#userModal" onclick="resetUserForm()">
                                    <i class="fa-solid fa-user-plus me-1"></i> Add New User
                                </button>
                            </div>

                            <div class="table-responsive border rounded mt-3">
                                <table class="table table-hover mb-0 align-middle" id="usersTable" style="width:100%">
                                    <thead class="table-light">
                                        <tr>
                                            <th>User</th>
                                            <th>Contact</th>
                                            <th>Role</th>
                                            <th>Created At</th>
                                            <th class="text-end">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Modal (Static Backdrop and Large) -->
    <div class="modal fade" id="userModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow-lg border-0 rounded-4">
                <div class="modal-header border-0 pb-0 shadow-sm p-4">
                    <h5 class="modal-title fw-bold text-primary" id="userModalLabel">Create New User Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="userForm">
                    <input type="hidden" name="id" id="user_id">
                    <div class="modal-body p-4">
                        <!-- Centered Photo Section (Settings Style) -->
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <img id="userPhotoPreview" src="https://ui-avatars.com/api/?name=User&background=random"
                                    class="rounded-circle border shadow-sm" width="120" height="120"
                                    style="object-fit: cover;">
                            </div>
                            <label for="user_photo_input"
                                class="btn btn-sm btn-outline-secondary px-4 fw-bold shadow-sm">
                                <i class="fa-solid fa-camera me-1"></i> Change Photo
                            </label>
                            <input type="file" id="user_photo_input" name="photo" accept="image/*" class="d-none"
                                onchange="previewUserPhoto(this)">
                        </div>

                        <div class="row g-3">
                            <div class="col-12 mb-2">
                                <label class="form-label small fw-bold text-muted">Full Name</label>
                                <input type="text" class="form-control px-3 py-2" name="fullname"
                                    placeholder="e.g. Michael Jordan">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label small fw-bold text-muted">Username *</label>
                                <input type="text" class="form-control px-3 py-2" name="username" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label small fw-bold text-muted">Role *</label>
                                <select class="form-select px-3 py-2" name="role">
                                    <option value="Cashier">Cashier</option>
                                    <option value="Accounts">Accounts</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Password *</label>
                                <input type="password" class="form-control px-3 py-2" name="password"
                                    id="user_password_input">
                            </div>
                            <div class="col-md-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Mobile Number</label>
                                <input type="text" class="form-control px-3 py-2" name="mobile">
                            </div>
                            <div class="col-md-4 mb-2">
                                <label class="form-label small fw-bold text-muted">Email (Optional)</label>
                                <input type="email" class="form-control px-3 py-2" name="email">
                            </div>
                            <div class="col-12 mb-2">
                                <label class="form-label small fw-bold text-muted">Short Bio / Details</label>
                                <textarea class="form-control px-3 py-2" name="short_details" id="short_details_input"
                                    rows="1" style="overflow:hidden; resize:none"
                                    placeholder="Enter short details..."></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="button" class="btn btn-light px-4 py-2 fw-bold"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-custom px-5 py-2 fw-bold" id="userSubmitBtn">
                            <i class="fa-solid fa-save me-2"></i>Create User Account
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer text-center">
        <div class="container">
            <span class="text-muted small">JUSTSALE POS System | Powered by <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="text-primary fw-bold text-decoration-none">Franklin</a></span>
            <span class="version-tag">Ver: 2.0.4</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/users.js"></script>
</body>

</html>
