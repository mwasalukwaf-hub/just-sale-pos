<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders Management | JUSTSALE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="top-main-nav">
        <div class="d-flex align-items-center">
            <div class="brand"><i class="fa-solid fa-cash-register me-2"></i>JUSTSALE</div>
            <div class="nav-links-container">
                <a href="admin" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="pos" target="_blank" class="nav-link"><i class="fa-solid fa-cash-register"></i> POS
                    Terminal</a>
                <div class="dropdown nav-link-dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-boxes-stacked"></i> Inventory
                    </a>
                    <ul class="dropdown-menu shadow-sm">
                        <li><a class="dropdown-item" href="inventory"><i class="fa-solid fa-boxes-stacked"></i> Catalog
                                &
                                Movements</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="receive-goods"><i class="fa-solid fa-file-invoice"></i> PO
                                Request</a></li>
                        <li><a class="dropdown-item" href="reception"><i class="fa-solid fa-truck-pickup"></i> Goods
                                Reception</a></li>
                        <li><a class="dropdown-item active" href="purchases"><i
                                    class="fa-solid fa-file-invoice-dollar"></i>
                                Purchase Orders</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="suppliers"><i class="fa-solid fa-handshake"></i>
                                Suppliers</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="nav-user-controls" id="current-user"></div>
    </nav>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0 text-secondary fw-bold"><i class="fa-solid fa-file-lines me-2 text-primary"></i>Purchase
                Orders (PO)</h4>
            <a href="receive-goods" class="btn btn-primary-custom px-4 shadow-sm">
                <i class="fa-solid fa-plus me-1"></i> Create New PO
            </a>
        </div>

        <div class="card card-elegant border-0 shadow-sm mb-4">
            <div class="card-body p-3">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 px-2" id="poSearch"
                                placeholder="Search by Supplier, PO #, or Creator...">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card card-elegant border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-custom table-hover mb-0" id="purchasesTable" style="width:100%">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>PO Number</th>
                                <th>Supplier</th>
                                <th>Created By</th>
                                <th class="text-end">Total Amount</th>
                                <th class="text-center">Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="poBody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer text-center">
        <div class="container">
            <span class="text-muted small">JUSTSALE POS System | Powered by <a href="http://franklin.co.tz/justsalePOS" target="_blank" class="text-primary fw-bold text-decoration-none">Franklin</a></span>
            <span class="version-tag">Ver: 2.0.4</span>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/purchases.js"></script>
</body>

</html>
